<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KÓDEX Sinergia - Terminal Offline</title>
<style>
  /* --- MOTOR DE ESTILO NATIVO (Alta Fidelidade Afrokódica) --- */
  :root {
    --bg-base: #020617; /* slate-950 */
    --bg-surface: #0f172a; /* slate-900 */
    --bg-elevated: #1e293b; /* slate-800 */
    --border: #334155; /* slate-700 */
    --text-main: #f8fafc; /* slate-50 */
    --text-muted: #94a3b8; /* slate-400 */
    --accent-emerald: #10b981; /* emerald-500 */
    --accent-emerald-hover: #059669; /* emerald-600 */
    --accent-amber: #f59e0b; /* amber-500 */
    --accent-red: #ef4444; /* red-500 */
    --accent-blue: #3b82f6; /* blue-500 */
    --font-family: system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-family); height: 100vh; display: flex; overflow: hidden; }
  
  /* Utilitários Flex e Grid Responsivos */
  .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; } .items-start { align-items: flex-start; } .justify-between { justify-content: space-between; } .justify-center { justify-content: center; } .justify-end { justify-content: flex-end; } .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; } .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; }
  
  .grid { display: grid; } 
  .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
  .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  
  /* Breakpoints Inteligentes */
  @media (min-width: 768px) {
    .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .md\:col-span-2 { grid-column: span 2 / span 2; }
    .md\:flex-row { flex-direction: row; }
    .md\:items-center { align-items: center; }
    .md\:mb-8 { margin-bottom: 2rem; }
    .md\:hidden { display: none !important; }
  }

  /* Espaçamentos e Textos Dinâmicos */
  .p-4 { padding: 1rem; } .p-5 { padding: 1.25rem; } .p-6 { padding: 1.5rem; } .p-8 { padding: 2rem; } .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; } .px-4 { padding-left: 1rem; padding-right: 1rem; } .mb-2 { margin-bottom: 0.5rem; } .mb-4 { margin-bottom: 1rem; } .mb-6 { margin-bottom: 1.5rem; } .mb-8 { margin-bottom: 2rem; } .mt-4 { margin-top: 1rem; } .mt-8 { margin-top: 2rem; }
  
  .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.875rem; } .text-base { font-size: 1rem; } .text-lg { font-size: 1.125rem; } .text-xl { font-size: 1.25rem; } .text-2xl { font-size: 1.5rem; } .text-3xl { font-size: 1.875rem; }
  .font-medium { font-weight: 500; } .font-bold { font-weight: 700; } .font-light { font-weight: 300; } .text-center { text-align: center; } .text-right { text-align: right; }
  .text-muted { color: var(--text-muted); } .text-emerald { color: var(--accent-emerald); } .text-amber { color: var(--accent-amber); } .text-red { color: var(--accent-red); } .text-blue { color: var(--accent-blue); }

  @media (max-width: 767px) {
    .text-3xl { font-size: 1.5rem; }
    .text-2xl { font-size: 1.25rem; }
    .p-8 { padding: 1.5rem; }
  }

  /* Componentes UI */
  .bg-surface { background-color: var(--bg-surface); } .bg-elevated { background-color: var(--bg-elevated); } .bg-base { background-color: var(--bg-base); }
  .border { border: 1px solid var(--border); } .border-t { border-top: 1px solid var(--border); } .border-b { border-bottom: 1px solid var(--border); }
  .rounded { border-radius: 0.25rem; } .rounded-lg { border-radius: 0.5rem; } .rounded-xl { border-radius: 0.75rem; } .rounded-2xl { border-radius: 1rem; } .rounded-full { border-radius: 9999px; }
  .shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
  
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; font-size: 0.875rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-emerald { background-color: var(--accent-emerald-hover); color: white; } .btn-emerald:hover:not(:disabled) { background-color: var(--accent-emerald); }
  .btn-amber { background-color: #d97706; color: white; } .btn-amber:hover:not(:disabled) { background-color: var(--accent-amber); }
  .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); } .btn-outline:hover:not(:disabled) { background-color: var(--bg-elevated); color: white; }
  .btn-danger { background-color: rgba(239, 68, 68, 0.2); color: var(--accent-red); } .btn-danger:hover:not(:disabled) { background-color: rgba(239, 68, 68, 0.4); }
  .btn-ghost { background: transparent; color: var(--text-muted); padding: 0.25rem 0.5rem; } .btn-ghost:hover { color: var(--accent-red); }

  .input-field { width: 100%; background-color: var(--bg-base); border: 1px solid var(--border); color: white; padding: 0.65rem 0.75rem; border-radius: 0.5rem; outline: none; transition: border-color 0.2s; font-family: var(--font-family); }
  .input-field:focus { border-color: var(--accent-emerald); }
  .input-label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.35rem; font-weight: 500; }

  /* Estrutura Principal Flexível */
  #app { width: 100%; height: 100%; display: flex; position: relative; }
  
  .main-content { flex: 1; overflow-y: auto; padding: 1.25rem; -webkit-overflow-scrolling: touch; }
  @media (min-width: 768px) { .main-content { padding: 2rem; } }

  /* Navegação Retrátil (Soberania Mobile) */
  .sidebar { 
    width: 280px; 
    background-color: var(--bg-surface); 
    border-right: 1px solid var(--border); 
    display: flex; 
    flex-direction: column; 
    height: 100vh;
    flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 50;
  }
  .overlay { 
    display: none; position: fixed; inset: 0; 
    background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); 
    z-index: 40; opacity: 0; transition: opacity 0.3s ease; 
  }

  @media (max-width: 767px) {
    .sidebar { position: fixed; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .overlay.show { display: block; opacity: 1; }
  }

  .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1rem; border-radius: 0.75rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; background: transparent; border: none; width: 100%; text-align: left; font-size: 0.875rem; margin-bottom: 0.25rem; }
  .nav-item:hover { background-color: var(--bg-elevated); color: white; }
  .nav-item.active { background-color: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); font-weight: 500; }
  
  /* Badges */
  .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
  .badge-emerald { background-color: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); }
  .badge-amber { background-color: rgba(245, 158, 11, 0.1); color: var(--accent-amber); }
  .badge-red { background-color: rgba(239, 68, 68, 0.1); color: var(--accent-red); }
  .badge-blue { background-color: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }

  /* Tabelas Adaptativas */
  .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); background-color: rgba(0,0,0,0.2); white-space: nowrap; }
  td { padding: 1rem; font-size: 0.875rem; border-bottom: 1px solid rgba(51, 65, 85, 0.5); }
  tr:hover td { background-color: rgba(30, 41, 59, 0.3); }

  /* Animações e Scrollbar */
  .fade-in { animation: fadeIn 0.3s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: var(--bg-base); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  
  .pulse-dot { width: 8px; height: 8px; background-color: var(--accent-emerald); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

  .task-card { position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .task-indicator { position: absolute; top: 0; left: 0; width: 4px; height: 100%; }

  /* Ecrã de Segurança Global */
  #kdx-error-screen { display: none; width: 100%; height: 100vh; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-base); color: white; padding: 2rem; text-align: center; position: absolute; z-index: 9999; top: 0; left: 0; }
</style>
</head>
<body>

<!-- Contentor Principal -->
<div id="app"></div>

<!-- Ecrã de Proteção Máxima (Blindagem contra Tela Preta) -->
<div id="kdx-error-screen">
  <div style="color:var(--accent-red); margin-bottom:1rem; transform: scale(1.5);">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
  </div>
  <h2 style="font-size:1.5rem; margin-bottom:0.5rem; font-weight:bold;">Anomalia de Memória Evitada</h2>
  <p style="color:var(--text-muted); margin-bottom:2rem; max-width:500px; line-height:1.5;">Ocorreu uma quebra no carregamento dos dados offline. Por segurança, ativamos o protocolo de bloqueio.</p>
  <button onclick="localStorage.clear(); window.location.reload();" style="background-color:rgba(239, 68, 68, 0.2); color:var(--accent-red); border:1px solid var(--accent-red); padding:1rem 2rem; border-radius:0.5rem; font-size:1rem; cursor:pointer; font-weight:bold; transition: 0.3s;">Limpar Memória e Restaurar</button>
</div>

<script>
  // Escudo Global de Erros (Garante que nunca há apenas uma tela preta)
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    document.getElementById('app').style.display = 'none';
    document.getElementById('kdx-error-screen').style.display = 'flex';
    console.error("KÓDEX Interceção Global:", msg, error);
    return false;
  };

  // --- ÍCONES SVG (Alta Fidelidade) ---
  const Icons = {
    menu: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>`,
    shield: `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-emerald"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>`,
    lock: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
    dashboard: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>`,
    megaphone: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-5v12L3 14v-3z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg>`,
    checkSquare: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>`,
    fingerprint: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12C2 6.48 6.48 2 12 2s10 4.48 10 10"></path><path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"></path><path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4"></path><path d="M11 12c0-.55.45-1 1-1s1 .45 1 1"></path></svg>`,
    calendarRange: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path></svg>`,
    users: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`,
    database: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>`,
    logout: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`,
    clock: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
    activity: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>`,
    bell: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>`,
    plus: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
    trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
    userPlus: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>`,
    download: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
    upload: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>`,
    alert: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
    fileDoc: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`
  };

  // --- SANEAMENTO DE DADOS (Impede a Tela Preta) ---
  const sysSetup = {
    users: [{ id: '1', name: 'Administrador de Sistema', role: 'Admin', department: 'Diretoria', position: 'Gestor de Dados', active: true, password: 'admin123' }],
    tasks: [], announcements: [], attendance: [], leaves: []
  };

  function sanitizeArray(arr, fallback) {
    if (!Array.isArray(arr)) return fallback;
    const limpo = arr.filter(item => item !== null && typeof item === 'object');
    return limpo.length > 0 ? limpo : fallback;
  }

  function loadData(key, def) {
    try { 
      const res = localStorage.getItem(key); 
      if (!res) return def;
      const parsed = JSON.parse(res);
      return parsed !== null ? parsed : def;
    } catch(e) { 
      return def; 
    }
  }
  
  function saveData(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  // Estado Global Purificado e Migração de Passwords Antigas
  let rawUsers = sanitizeArray(loadData('afrokodica_offline_users', sysSetup.users), sysSetup.users);
  
  // Módulo de Migração KÓDEX: Se houver users antigos sem passe, define "1234" para normais e "admin123" para o Admin originário
  rawUsers = rawUsers.map(u => {
    if (u && !u.password) {
      u.password = (u.role === 'Admin' && u.id === '1') ? 'admin123' : '1234';
    }
    return u;
  });

  const state = {
    users: rawUsers,
    tasks: sanitizeArray(loadData('afrokodica_offline_tasks', sysSetup.tasks), sysSetup.tasks),
    announcements: sanitizeArray(loadData('afrokodica_offline_announcements', sysSetup.announcements), sysSetup.announcements),
    attendance: sanitizeArray(loadData('afrokodica_offline_attendance', sysSetup.attendance), sysSetup.attendance),
    leaves: sanitizeArray(loadData('afrokodica_offline_leaves', sysSetup.leaves), sysSetup.leaves),
    currentUser: null,
    activeTab: 'dashboard',
    filterTasks: 'Todas',
    filterAttDate: new Date().toISOString().split('T')[0],
    isAddingTask: false,
    isAddingAnn: false,
    isAddingLeave: false,
    isAddingUser: false
  };

  // Garante que a migração de segurança fica salva no disco local
  saveData('afrokodica_offline_users', state.users);

  function updateState(key, val, saveKey) {
    state[key] = val;
    if(saveKey) saveData(saveKey, val);
    renderApp();
  }

  // --- CONTROLADORES DE AÇÃO GLOBAIS ---
  window.kdx = {
    emergencyWipe: () => {
      localStorage.clear();
      window.location.reload();
    },
    toggleSidebar: () => {
      const sb = document.getElementById('kdx-sidebar');
      const ov = document.getElementById('kdx-overlay');
      if(sb) sb.classList.toggle('open');
      if(ov) ov.classList.toggle('show');
    },
    login: (e) => {
      e.preventDefault();
      const id = document.getElementById('loginSelect').value;
      const pass = document.getElementById('loginPassword').value;
      
      if(!id) return alert("Selecione uma credencial de acesso.");
      
      const user = state.users.find(u => u && u.id === id);
      
      // Validação KÓDEX de Senha Offline
      if(user && user.password !== pass) {
        alert("❌ Acesso Negado. Palavra-passe incorreta.");
        return;
      }

      state.currentUser = user;
      state.activeTab = 'dashboard';
      renderApp();
    },
    logout: () => { state.currentUser = null; renderApp(); },
    nav: (tab) => { 
      state.activeTab = tab; 
      resetForms(); 
      renderApp(); 
      if(window.innerWidth <= 767) {
        const sb = document.getElementById('kdx-sidebar');
        const ov = document.getElementById('kdx-overlay');
        if(sb) sb.classList.remove('open');
        if(ov) ov.classList.remove('show');
      }
    },
    
    // Tarefas
    toggleFormTask: () => { state.isAddingTask = !state.isAddingTask; renderApp(); },
    setTaskFilter: (f) => { state.filterTasks = f; renderApp(); },
    addTask: (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const newTask = { id: Date.now().toString(), title: fd.get('title'), description: fd.get('desc'), priority: fd.get('priority'), assignedTo: fd.get('assigned'), status: 'Pendente', createdBy: state.currentUser.id, createdAt: new Date().toISOString() };
      updateState('tasks', [...state.tasks, newTask], 'afrokodica_offline_tasks');
      state.isAddingTask = false; renderApp();
    },
    delTask: (id) => { if(confirm('Eliminar permanentemente este registo?')) updateState('tasks', state.tasks.filter(t=>t.id!==id), 'afrokodica_offline_tasks'); },
    toggleTaskStatus: (id) => {
      const updated = state.tasks.map(t => t.id===id ? {...t, status: t.status==='Pendente'?'Concluída':'Pendente'} : t);
      updateState('tasks', updated, 'afrokodica_offline_tasks');
    },

    // Mural
    toggleFormAnn: () => { state.isAddingAnn = !state.isAddingAnn; renderApp(); },
    addAnn: (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const newAnn = { id: Date.now().toString(), title: fd.get('title'), content: fd.get('content'), authorId: state.currentUser.id, authorName: state.currentUser.name || 'Admin', createdAt: new Date().toISOString() };
      updateState('announcements', [newAnn, ...state.announcements], 'afrokodica_offline_announcements');
      state.isAddingAnn = false; renderApp();
    },
    delAnn: (id) => { if(confirm('Remover comunicado?')) updateState('announcements', state.announcements.filter(a=>a.id!==id), 'afrokodica_offline_announcements'); },

    // Assiduidade
    checkIn: () => {
      const today = new Date().toISOString().split('T')[0];
      const time = new Date().toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
      const rec = { id: Date.now().toString(), userId: state.currentUser.id, date: today, checkIn: time, checkOut: null };
      updateState('attendance', [...state.attendance, rec], 'afrokodica_offline_attendance');
    },
    checkOut: () => {
      const today = new Date().toISOString().split('T')[0];
      const time = new Date().toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
      const updated = state.attendance.map(a => (a.userId===state.currentUser.id && a.date===today && !a.checkOut) ? {...a, checkOut: time} : a);
      updateState('attendance', updated, 'afrokodica_offline_attendance');
    },
    filterAtt: (e) => { state.filterAttDate = e.target.value; renderApp(); },

    // Licenças
    toggleFormLeave: () => { state.isAddingLeave = !state.isAddingLeave; renderApp(); },
    addLeave: (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const req = { id: Date.now().toString(), userId: state.currentUser.id, type: fd.get('type'), reason: fd.get('reason'), startDate: fd.get('start'), endDate: fd.get('end'), status: 'Pendente', requestedAt: new Date().toISOString() };
      updateState('leaves', [...state.leaves, req], 'afrokodica_offline_leaves');
      state.isAddingLeave = false; renderApp();
    },
    updLeave: (id, st) => { updateState('leaves', state.leaves.map(l=>l.id===id?{...l,status:st}:l), 'afrokodica_offline_leaves'); },

    // RH
    toggleFormUser: () => { state.isAddingUser = !state.isAddingUser; renderApp(); },
    addUser: (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const usr = { 
        id: Date.now().toString(), 
        name: fd.get('name'), 
        position: fd.get('pos'), 
        department: fd.get('dep'), 
        role: fd.get('role'), 
        password: fd.get('pass'), // Captura a Palavra-passe
        active: true 
      };
      updateState('users', [...state.users, usr], 'afrokodica_offline_users');
      state.isAddingUser = false; renderApp();
    },
    togUser: (id) => { updateState('users', state.users.map(u=>u.id===id?{...u,active:!u.active}:u), 'afrokodica_offline_users'); },

    // Sistema
    exportDB: () => {
      const data = { users: state.users, tasks: state.tasks, announcements: state.announcements, attendance: state.attendance, leaves: state.leaves, timestamp: new Date().toISOString(), v: '5.0-Soberania' };
      const str = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
      const a = document.createElement('a'); a.href = str; a.download = `KODEX_Backup_${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a); a.click(); a.remove();
    },
    
    // NOVO: Gerador de Documentos Híbrido (.DOC)
    exportDOC: () => {
      let html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
          <meta charset='utf-8'>
          <title>Relatório Operacional KÓDEX</title>
          <style>
            body { font-family: Arial, sans-serif; color: #333; }
            h1 { color: #10b981; text-align: center; border-bottom: 2px solid #10b981; padding-bottom: 10px; }
            h2 { color: #1e293b; margin-top: 30px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
            th { background-color: #f1f5f9; font-weight: bold; }
          </style>
        </head>
        <body>
          <h1>Relatório de Operações - Gestão Institucional</h1>
          <p><strong>Data de Emissão:</strong> ${new Date().toLocaleDateString('pt-PT')}</p>
          <p><strong>Sistema:</strong> KÓDEX Sinergia (Edição Offline)</p>
          
          <h2>Quadro de Talentos Ativos</h2>
          <table><tr><th>Nome Completo</th><th>Departamento</th><th>Cargo</th><th>Nível</th></tr>`;
      
      state.users.filter(u => u && u.active).forEach(u => {
        html += `<tr><td>${u.name || '-'}</td><td>${u.department || '-'}</td><td>${u.position || '-'}</td><td>${u.role || '-'}</td></tr>`;
      });
      
      html += `</table>
          <h2>Registos de Assiduidade Recentes</h2>
          <table><tr><th>Data</th><th>Funcionário</th><th>Departamento</th><th>Entrada</th><th>Saída</th></tr>`;
      
      // Mostrar as últimas 50 entradas de assiduidade
      state.attendance.slice().reverse().slice(0, 50).forEach(a => {
        const u = state.users.find(x => x && x.id === a.userId);
        html += `<tr><td>${a.date}</td><td>${u ? u.name : 'Desconhecido'}</td><td>${u ? u.department : '-'}</td><td>${a.checkIn}</td><td>${a.checkOut || 'Turno a decorrer'}</td></tr>`;
      });

      html += `</table>
          <h2>Tarefas e Ocorrências</h2>
          <table><tr><th>Status</th><th>Prioridade</th><th>Tarefa</th><th>Responsável</th></tr>`;
      
      state.tasks.slice().reverse().slice(0, 50).forEach(t => {
        const u = state.users.find(x => x && x.id === t.assignedTo);
        html += `<tr><td>${t.status}</td><td>${t.priority}</td><td>${t.title}</td><td>${u ? u.name : 'N/A'}</td></tr>`;
      });

      html += `</table></body></html>`;

      // Conversão e Download
      const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Relatorio_Oficial_${new Date().toISOString().split('T')[0]}.doc`;
      document.body.appendChild(a); 
      a.click(); 
      a.remove();
    },

    importDB: (e) => {
      const file = e.target.files[0]; if(!file) return;
      if(!confirm("Atenção: Substituir todos os dados locais?")) { e.target.value = ''; return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const d = JSON.parse(ev.target.result);
          if(d.users) updateState('users', sanitizeArray(d.users, state.users), 'afrokodica_offline_users');
          if(d.tasks) updateState('tasks', sanitizeArray(d.tasks, state.tasks), 'afrokodica_offline_tasks');
          if(d.announcements) updateState('announcements', sanitizeArray(d.announcements, state.announcements), 'afrokodica_offline_announcements');
          if(d.attendance) updateState('attendance', sanitizeArray(d.attendance, state.attendance), 'afrokodica_offline_attendance');
          if(d.leaves) updateState('leaves', sanitizeArray(d.leaves, state.leaves), 'afrokodica_offline_leaves');
          alert("Restauro Concluído!");
        } catch(err) { alert("Ficheiro inválido."); }
        e.target.value = '';
      };
      reader.readAsText(file);
    },
    wipeDB: () => {
      if(confirm("PERIGO: Apagar máquina?") && prompt("Digite APAGAR") === 'APAGAR') {
        kdx.emergencyWipe();
      }
    }
  };

  function resetForms() { state.isAddingTask=false; state.isAddingAnn=false; state.isAddingLeave=false; state.isAddingUser=false; }

  // --- RENDERIZADORES DE VISTAS (Blindados contra nulos) ---

            <div style="overflow:hidden;"><p class="text-sm font-medium" style="white-space:nowrap;text-overflow:ellipsis;">${uName}</p><p class="text-xs text-muted">${state.currentUser.role || 'Geral'}</p></div>

    const titles = { dashboard:'Visão Global Operacional', mural:'Mural de Sincronia', tasks:'Evolução de Tarefas', attendance:'Registo de Presença', leaves:'Gestão de Ciclos', hr:'Gestão de Talentos (RH)', system:'Cofre de Segurança' };

        </div>

  function renderDashboard() {
    const today = new Date().toISOString().split('T')[0];
    const myTasks = state.tasks.filter(t => t && t.assignedTo === state.currentUser.id && t.status === 'Pendente').length;
    const present = new Set(state.attendance.filter(a => a && a.date === today).map(a => a.userId)).size;
    const activeU = state.users.filter(u => u && u.active).length;
    
    const acts = state.tasks.slice().reverse().slice(0,4).map(t => {
      if(!t) return '';
      return `
      <div class="flex flex-col sm:flex-row justify-between sm:items-center p-3 bg-base border rounded-xl gap-2">
        <div style="overflow:hidden; padding-right:1rem;"><p class="font-medium text-sm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.title || 'Sem título'}</p></div>
        <span class="badge self-start sm:self-auto ${t.status==='Concluída'?'badge-emerald':'badge-amber'}">${t.status || 'Pendente'}</span>
      </div>
    `}).join('') || '<p class="text-muted text-sm">Sem registos operacionais.</p>';

    const anns = state.announcements.slice(0,2).map(a => {
      if(!a) return '';
      return `
      <div class="p-4 bg-base border rounded-xl" style="border-left:4px solid var(--accent-amber);">
        <h4 class="font-medium text-sm mb-1">${a.title || 'Aviso'}</h4>
        <p class="text-muted text-xs mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${a.content || ''}</p>
        <div class="text-right text-xs text-muted">${a.createdAt ? new Date(a.createdAt).toLocaleDateString() : 'Data oculta'}</div>
      </div>
    `}).join('') || '<p class="text-muted text-sm">Mural limpo.</p>';

    return `
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6 fade-in">
        <div class="bg-surface border rounded-2xl p-5 md:p-6 flex items-center gap-4"><div class="p-3 rounded-xl badge-amber">${Icons.clock}</div><div><p class="text-sm text-muted">Pendentes</p><p class="text-2xl font-bold">${myTasks}</p></div></div>
        <div class="bg-surface border rounded-2xl p-5 md:p-6 flex items-center gap-4"><div class="p-3 rounded-xl badge-blue">${Icons.fingerprint}</div><div><p class="text-sm text-muted">Presenças Hoje</p><p class="text-2xl font-bold">${present} / ${activeU}</p></div></div>
        ${state.currentUser.role === 'Admin' ? `<div class="bg-surface border rounded-2xl p-5 md:p-6 flex items-center gap-4"><div class="p-3 rounded-xl badge-emerald">${Icons.users}</div><div><p class="text-sm text-muted">Ativos</p><p class="text-2xl font-bold">${activeU}</p></div></div>` : ''}
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 fade-in">

        <div class="bg-surface border rounded-2xl p-5 md:p-6"><h3 class="font-medium mb-4 flex items-center gap-2"><span class="text-amber">${Icons.bell}</span> Avisos</h3><div class="flex flex-col gap-3">${anns}</div></div>

      if(!a) return '';
      return `

        ${form}
        ${list}
      </div>
    `;
  }

  function renderTasks() {
    let tList = state.tasks;
    if(state.filterTasks==='Minhas') tList = tList.filter(t => t && t.assignedTo === state.currentUser.id);
    tList = tList.sort((a,b)=>new Date(b.createdAt || 0)-new Date(a.createdAt || 0));

    const htmlList = tList.map(t => {
      if(!t) return '';
      const u = state.users.find(x => x && x.id === t.assignedTo);
      return `
      <div class="task-card bg-surface border rounded-xl p-5 shadow-sm">
        <div class="task-indicator ${t.priority==='Urgente'?'bg-red':'bg-emerald'}" style="background-color: var(--accent-${t.priority==='Urgente'?'red':'emerald'});"></div>
        <div class="flex justify-between items-start mb-3 pl-3">
          <span class="badge ${t.priority==='Urgente'?'badge-red':'badge-emerald'}">${t.priority || 'Normal'}</span>
          ${(state.currentUser.role==='Admin' || t.createdBy===state.currentUser.id) ? `<button onclick="kdx.delTask('${t.id}')" class="btn-ghost" style="padding:0;">${Icons.trash}</button>`:''}
        </div>
        <h4 class="font-medium mb-2 pl-3 text-lg leading-tight">${t.title || 'Tarefa'}</h4>
        <p class="text-sm text-muted mb-4 pl-3" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${t.description || ''}</p>
        <div class="border-t pt-4 mt-auto flex justify-between items-center pl-3">
          <span class="text-xs text-muted flex items-center gap-1">${Icons.users} <span style="max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${u?u.name:'N/A'}</span></span>
          <button onclick="kdx.toggleTaskStatus('${t.id}')" class="badge ${t.status==='Concluída'?'badge-emerald':'bg-elevated text-main border-none'}" style="cursor:pointer;">${t.status || 'Pendente'}</button>
        </div>
      </div>`
    }).join('') || '<div style="grid-column:1/-1" class="text-center p-8 text-muted border rounded-xl border-dashed">Nenhuma tarefa encontrada.</div>';

    const form = state.isAddingTask ? `
      <form onsubmit="kdx.addTask(event)" class="bg-surface border rounded-xl p-5 md:p-6 mb-6 fade-in">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div class="md:col-span-2"><label class="input-label">Título</label><input name="title" required class="input-field"></div>
          <div class="md:col-span-2"><label class="input-label">Detalhes</label><textarea name="desc" required class="input-field h-24"></textarea></div>
          <div><label class="input-label">Prioridade</label><select name="priority" class="input-field"><option>Normal</option><option>Urgente</option></select></div>
          <div><label class="input-label">Atribuir a</label><select name="assigned" ${state.currentUser.role!=='Admin'?'disabled':''} class="input-field"><option value="${state.currentUser.id}">A mim</option>${state.users.filter(u=>u && u.id!==state.currentUser.id && u.active).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
        </div>
        <div class="flex flex-wrap justify-end gap-3"><button type="button" onclick="kdx.toggleFormTask()" class="btn btn-ghost w-full sm:w-auto">Cancelar</button><button type="submit" class="btn btn-emerald w-full sm:w-auto">Guardar Tarefa</button></div>
      </form>
    ` : '';

    return `
      <div class="fade-in">
        <div class="bg-surface border rounded-xl p-3 md:p-4 flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
          <div class="flex flex-wrap gap-2 w-full sm:w-auto">
            <button onclick="kdx.setTaskFilter('Todas')" class="btn ${state.filterTasks==='Todas'?'badge-emerald':'btn-ghost'} flex-1 sm:flex-none">Todas</button>
            <button onclick="kdx.setTaskFilter('Minhas')" class="btn ${state.filterTasks==='Minhas'?'badge-emerald':'btn-ghost'} flex-1 sm:flex-none">Minhas</button>
          </div>
          <button onclick="kdx.toggleFormTask()" class="btn btn-emerald w-full sm:w-auto">${Icons.plus} Nova Tarefa</button>
        </div>
        ${form}
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">${htmlList}</div>
      </div>
    `;
  }

  function renderAttendance() {
    const today = new Date().toISOString().split('T')[0];
    const myRec = state.attendance.find(a => a && a.userId===state.currentUser.id && a.date===today);
    
    // Função auxiliar para calcular horas
    const calcHours = (inTime, outTime) => {
      if(!inTime || !outTime) return '-';
      const [h1, m1] = inTime.split(':').map(Number);
      const [h2, m2] = outTime.split(':').map(Number);
      let mins = (h2*60+m2) - (h1*60+m1);
      if(mins < 0) mins += 24*60; // Caso tenha passado da meia-noite
      return `${Math.floor(mins/60)}h ${mins%60}m`;
    };
    
    let tablesHtml = '';

    if(state.currentUser.role === 'Admin') {
      // Visão de Administrador (Todos os utilizadores e cálculo de horas)
      const daily = state.attendance.filter(a => a && a.date===state.filterAttDate);
      const rows = state.users.filter(u => u && u.active).map(u => {
        const r = daily.find(a => a && a.userId===u.id);
        const st = !r ? '<span class="badge badge-red">Ausente</span>' : (!r.checkOut ? '<span class="badge badge-emerald">Em Turno</span>' : '<span class="badge" style="background:var(--bg-elevated);">Concluído</span>');
        const duracao = r ? calcHours(r.checkIn, r.checkOut) : '-';
        
        return `
        <tr>
          <td>
            <div class="flex items-center gap-3">
              <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-elevated);color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.8rem;border:1px solid var(--border);flex-shrink:0;">${u.name.charAt(0)}</div>
              <div><div class="font-medium text-main whitespace-nowrap">${u.name}</div><div class="text-xs text-muted">${u.department} &bull; ${u.position}</div></div>
            </div>
          </td>
          <td><span class="font-medium text-emerald">${r?r.checkIn:'--:--'}</span></td>
          <td><span class="font-medium text-amber">${r&&r.checkOut?r.checkOut:'--:--'}</span></td>
          <td><span class="text-xs text-muted">${duracao}</span></td>
          <td>${st}</td>
        </tr>`;
      }).join('');
      
      tablesHtml = `
        <div class="bg-surface border rounded-xl overflow-hidden mt-8">
          <div class="p-4 border-b flex flex-col sm:flex-row justify-between sm:items-center gap-3 bg-base">
            <h3 class="font-medium text-emerald flex items-center gap-2">${Icons.users} Matriz de Presenças da Equipa</h3>
            <input type="date" value="${state.filterAttDate}" onchange="kdx.filterAtt(event)" class="input-field" style="width:auto; padding:0.4rem;">
          </div>
          <div class="table-responsive">
            <table>
              <thead><tr><th>Funcionário / Detalhes</th><th>Entrada</th><th>Saída</th><th>Tempo Gasto</th><th>Status</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    } else {
      // Visão de Funcionário Padrão (Histórico Individual)
      const myHistory = state.attendance.filter(a => a && a.userId === state.currentUser.id).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
      const rows = myHistory.map(a => {
        const duracao = calcHours(a.checkIn, a.checkOut);
        return `<tr>
          <td><span class="text-main">${new Date(a.date).toLocaleDateString('pt-PT')}</span></td>
          <td><span class="text-emerald">${a.checkIn}</span></td>
          <td><span class="text-amber">${a.checkOut || '--:--'}</span></td>
          <td><span class="text-xs text-muted">${duracao}</span></td>
        </tr>`;
      }).join('') || '<tr><td colspan="4" class="text-center p-4 text-muted">Nenhum registo efetuado.</td></tr>';

      tablesHtml = `
        <div class="bg-surface border rounded-xl overflow-hidden mt-8">
          <div class="p-4 border-b bg-base">
            <h3 class="font-medium text-main flex items-center gap-2">${Icons.clock} O Meu Histórico Recente (10 dias)</h3>
          </div>
          <div class="table-responsive">
            <table>
              <thead><tr><th>Data</th><th>Entrada</th><th>Saída</th><th>Horas Apuradas</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    return `
      <div class="fade-in">
        <div class="bg-surface border rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center shadow-sm">
          <div style="color:var(--${myRec&&!myRec.checkOut?'accent-emerald':'text-muted'}); margin-bottom:1.5rem; transform: scale(1.5);">
            ${Icons.fingerprint}
          </div>
          <h2 class="text-xl md:text-2xl font-medium mb-2">Terminal Presencial</h2>
          <p class="text-muted mb-8 text-sm md:text-base">Data Biológica: ${new Date().toLocaleDateString('pt-PT')}</p>
          <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
            <button onclick="kdx.checkIn()" ${myRec?'disabled':''} class="btn ${myRec?'btn-outline':'btn-emerald'} w-full sm:w-auto font-bold" style="padding:1rem 2.5rem; font-size:1rem;">Registar Entrada</button>
            <button onclick="kdx.checkOut()" ${(!myRec||myRec.checkOut)?'disabled':''} class="btn ${(!myRec||myRec.checkOut)?'btn-outline':'btn-amber'} w-full sm:w-auto font-bold" style="padding:1rem 2.5rem; font-size:1rem;">Registar Saída</button>
          </div>
          ${myRec ? `<div class="mt-8 badge badge-emerald" style="padding:0.8rem 1.5rem; font-size:0.9rem; text-transform:none;">✔️ Entrada validada às ${myRec.checkIn} ${myRec.checkOut?'<br class="sm:hidden">| ✔️ Saída validada às '+myRec.checkOut:''}</div>` : ''}
        </div>
        ${tablesHtml}
      </div>
    `;
  }

  function renderLeaves() {
    const list = (state.currentUser.role==='Admin' ? state.leaves : state.leaves.filter(l => l && l.userId===state.currentUser.id))
      .filter(l => l != null)
      .sort((a,b)=>new Date(b.requestedAt || 0)-new Date(a.requestedAt || 0));
    
    const rows = list.map(l => {
      const u = state.users.find(x => x && x.id===l.userId);
      const stClass = l.status==='Aprovado'?'badge-emerald':l.status==='Rejeitado'?'badge-red':'badge-amber';
      return `<tr>
        ${state.currentUser.role==='Admin'?`<td>${u?u.name:'-'}</td>`:''}
        <td><div class="font-medium">${l.type || '-'}</div><div class="text-xs text-muted max-w-[150px] overflow-hidden text-ellipsis whitespace-nowrap" title="${l.reason || ''}">${l.reason || ''}</div></td>
        <td style="white-space:nowrap;">${l.startDate || '-'} a ${l.endDate || '-'}</td>
        <td><span class="badge ${stClass}">${l.status || 'Pendente'}</span></td>
        ${state.currentUser.role==='Admin'?`<td class="text-right" style="white-space:nowrap;">${l.status==='Pendente'?`<button onclick="kdx.updLeave('${l.id}','Aprovado')" class="badge badge-emerald" style="border:none;cursor:pointer;margin-right:4px;">Aprovar</button><button onclick="kdx.updLeave('${l.id}','Rejeitado')" class="badge badge-red" style="border:none;cursor:pointer;">Rejeitar</button>`:''}</td>`:''}
      </tr>`;
    }).join('') || `<tr><td colspan="5" class="text-center p-8 text-muted">Nenhum registo de licença.</td></tr>`;

    const form = state.isAddingLeave ? `
      <form onsubmit="kdx.addLeave(event)" class="bg-surface border rounded-xl p-5 md:p-6 mb-6 fade-in">
        <h3 class="font-medium mb-4">Requerimento de Ausência</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div><label class="input-label">Tipo de Licença</label><select name="type" class="input-field"><option>Férias Anuais</option><option>Licença Médica</option><option>Justificação Pontual</option><option>Luto</option></select></div>
          <div><label class="input-label">Motivo Resumido</label><input name="reason" required class="input-field"></div>
          <div><label class="input-label">Data de Início</label><input type="date" name="start" required class="input-field"></div>
          <div><label class="input-label">Data de Término</label><input type="date" name="end" required class="input-field"></div>
        </div>
        <div class="flex flex-wrap justify-end gap-3 mt-4"><button type="button" onclick="kdx.toggleFormLeave()" class="btn btn-ghost w-full sm:w-auto">Cancelar</button><button type="submit" class="btn btn-emerald w-full sm:w-auto">Submeter Pedido</button></div>
      </form>
    ` : '';

    return `
      <div class="fade-in">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center bg-surface p-4 rounded-xl border mb-6 gap-4">
          <h3 class="font-medium">Histórico de Pedidos</h3>
          <button onclick="kdx.toggleFormLeave()" class="btn btn-emerald w-full sm:w-auto">${Icons.plus} Solicitar Licença</button>
        </div>
        ${form}
        <div class="bg-surface border rounded-xl overflow-hidden">
          <div class="table-responsive">
            <table><thead><tr>${state.currentUser.role==='Admin'?'<th>Requerente</th>':''}<th>Tipo/Motivo</th><th>Período</th><th>Estado</th>${state.currentUser.role==='Admin'?'<th class="text-right">Ação</th>':''}</tr></thead><tbody>${rows}</tbody></table>
          </div>
        </div>
      </div>
    `;
  }

  function renderHR() {
    if(state.currentUser.role!=='Admin') return '';
    const form = state.isAddingUser ? `
      <form onsubmit="kdx.addUser(event)" class="bg-surface border rounded-xl p-5 md:p-6 mb-6 fade-in">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <div class="md:col-span-2"><label class="input-label">Nome Completo</label><input name="name" required class="input-field"></div>
          <div><label class="input-label">Cargo / Posição</label><input name="pos" required class="input-field"></div>
          <div><label class="input-label">Departamento</label><input name="dep" required class="input-field"></div>
          <div><label class="input-label">Palavra-passe Inicial</label><input name="pass" type="password" required class="input-field" placeholder="Ex: 1234"></div>
          <div><label class="input-label">Nível de Acesso</label><select name="role" class="input-field"><option value="Employee">Utilizador Padrão</option><option value="Admin">Administrador (Total)</option></select></div>
        </div>
        <div class="flex flex-wrap justify-end gap-3 mt-4"><button type="button" onclick="kdx.toggleFormUser()" class="btn btn-ghost w-full sm:w-auto">Cancelar</button><button type="submit" class="btn btn-emerald w-full sm:w-auto">Salvar Registo</button></div>
      </form>
    ` : '';

    const rows = state.users.map(u => {
      if(!u) return '';
      return `
      <tr>
        <td style="white-space:nowrap;">
          <div class="flex items-center gap-3">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bg-elevated);color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.8rem;border:1px solid var(--border);">${u.name.charAt(0)}</div>
            <div><div class="font-medium ${!u.active?'text-muted':''}">${u.name || '-'}</div><div class="text-xs text-muted">${u.position || '-'}</div></div>
          </div>
        </td>
        <td style="white-space:nowrap;">${u.department || '-'}</td>
        <td><span class="badge ${u.role==='Admin'?'badge-amber':'badge-blue'}">${u.role || 'Employee'}</span></td>
        <td>${u.active?'<span class="text-emerald text-xs font-medium">&bull; Ativo</span>':'<span class="text-red text-xs font-medium">&bull; Inativo</span>'}</td>
        <td class="text-right"><button onclick="kdx.togUser('${u.id}')" ${u.id===state.currentUser.id?'disabled':''} class="btn btn-outline" style="padding:0.35rem 0.6rem; font-size:0.75rem;">${u.active?'Suspender':'Ativar'}</button></td>
      </tr>
    `}).join('');

    return `
      <div class="fade-in">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center bg-surface p-4 rounded-xl border mb-6 gap-4">
          <div class="text-sm font-medium">Servidores Ativos: <span class="text-emerald">${state.users.filter(u=>u && u.active).length}</span></div>
          <button onclick="kdx.toggleFormUser()" class="btn btn-emerald w-full sm:w-auto">${Icons.userPlus} Novo Funcionário</button>
        </div>
        ${form}
        <div class="bg-surface border rounded-xl overflow-hidden">
          <div class="table-responsive">
            <table><thead><tr><th>Perfil do Servidor</th><th>Departamento</th><th>Acesso</th><th>Status</th><th class="text-right">Ação</th></tr></thead><tbody>${rows}</tbody></table>
          </div>
        </div>
      </div>
    `;
  }

  function renderSystem() {
    if(state.currentUser.role!=='Admin') return '';
    return `
      <div class="bg-surface border rounded-2xl p-5 md:p-8 fade-in">
        <h2 class="text-xl md:text-2xl font-medium mb-6 flex items-center gap-2"><span class="text-emerald">${Icons.database}</span> Cofre de Dados Offline</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
          
          <button onclick="kdx.exportDB()" class="bg-base border rounded-xl p-6 text-left" style="cursor:pointer; transition:0.2s;">
            <div class="text-blue mb-3 transform scale-125 origin-left">${Icons.download}</div>
            <h3 class="font-medium mb-1">Backup Técnico (JSON)</h3><p class="text-xs text-muted">Ficheiro nativo para transferir todo o sistema para outro computador.</p>
          </button>

          <button onclick="kdx.exportDOC()" class="bg-base border rounded-xl p-6 text-left" style="cursor:pointer; transition:0.2s; border-color: rgba(16, 185, 129, 0.3);">
            <div class="text-emerald mb-3 transform scale-125 origin-left">${Icons.fileDoc}</div>
            <h3 class="font-medium mb-1">Relatório Oficial (Word)</h3><p class="text-xs text-muted">Gera um documento em formato .DOC pronto para visualização e impressão.</p>
          </button>

          <button onclick="document.getElementById('importFile').click()" class="bg-base border rounded-xl p-6 text-left" style="cursor:pointer; transition:0.2s;">
            <div class="text-amber mb-3 transform scale-125 origin-left">${Icons.upload}</div>
            <h3 class="font-medium mb-1">Restaurar Ficheiro</h3><p class="text-xs text-muted">Substitui os dados locais usando um Backup Técnico (JSON).</p>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="kdx.importDB(event)">
          </button>

        </div>
        <div class="border-t pt-6 mt-4">
          <div class="flex flex-col md:flex-row justify-between md:items-center bg-base border rounded-xl p-5 md:p-6 gap-4" style="border-color:rgba(239,68,68,0.3);">
            <div><h3 class="text-red font-medium flex items-center gap-2 mb-1">${Icons.alert} Protocolo de Formatação</h3><p class="text-sm text-muted">Apaga fisicamente todos os registos do disco desta máquina.</p></div>
            <button onclick="kdx.wipeDB()" class="btn btn-danger w-full md:w-auto px-6 py-3">Limpar Máquina</button>
          </div>
        </div>
      </div>
    `;
  }

  // --- O NÚCLEO DE RENDERIZAÇÃO ---
  function renderApp() {
    try {
      const root = document.getElementById('app');
      
      // Se não há utilizador logado, desenha ecrã seguro
      if(!state.currentUser) { 
        root.innerHTML = renderLogin(); 
        return; 
      }

      // Resolve a vista solicitada
      let view = '';
      switch(state.activeTab) {
        case 'dashboard': view = renderDashboard(); break;
        case 'mural': view = renderMural(); break;
        case 'tasks': view = renderTasks(); break;
        case 'attendance': view = renderAttendance(); break;
        case 'leaves': view = renderLeaves(); break;
        case 'hr': view = renderHR(); break;
        case 'system': view = renderSystem(); break;
        default: view = renderDashboard();
      }

      // Aplica a interface principal
      root.innerHTML = `
        ${renderSidebar()}
        <main class="main-content">
          ${renderHeader()}
          ${view}
        </main>
      `;

      // Se havia um ecrã de erro visível, oculta-o e certifica-se de que o #app volta a aparecer
      document.getElementById('kdx-error-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';

    } catch (error) {
      // Engatilha o protocolo anti-colapso se o DOM render falhar
      console.error("KÓDEX Erro de Renderização Detetado:", error);
      document.getElementById('app').style.display = 'none';
      document.getElementById('kdx-error-screen').style.display = 'flex';
    }
  }

  // Arranque Segurado
  window.onload = () => {
    renderApp();
  };
</script>
</body>
</html>
